<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-Translator 设置</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="page">
      <form id="settings-form" class="card">
        <header class="header">
          <div>
            <h1>AI-Translator 设置</h1>
            <p>配置翻译服务和默认参数。</p>
          </div>
        </header>

        <section class="section">
          <h2>服务商</h2>
          <div id="provider-switch" class="segmented"></div>

          <div class="field-grid">
            <label class="field field--full">
              <span>API Key</span>
              <input id="api-key" type="password" autocomplete="off" placeholder="输入当前服务商的 API Key" />
            </label>

            <label class="field">
              <span>Base URL</span>
              <input id="base-url" type="url" placeholder="https://api.deepseek.com" />
            </label>

            <label class="field">
              <span>模型</span>
              <input id="model" type="text" placeholder="deepseek-chat" />
            </label>
          </div>
        </section>

        <section class="section">
          <h2>翻译参数</h2>

          <div class="field-grid">
            <label class="field">
              <span>源语言</span>
              <select id="source-language"></select>
            </label>

            <label class="field">
              <span>目标语言</span>
              <select id="target-language"></select>
            </label>

            <label class="field">
              <span>翻译风格</span>
              <select id="style"></select>
            </label>

            <label class="field">
              <span>Temperature</span>
              <input id="temperature" type="number" min="0" max="1.5" step="0.1" />
            </label>

            <label class="field">
              <span>划词上限</span>
              <input id="selection-max-chars" type="number" min="200" step="100" />
            </label>

            <label class="field">
              <span>全文上限</span>
              <input id="page-max-chars" type="number" min="2000" step="500" />
            </label>

            <label class="field">
              <span>全文显示位置</span>
              <select id="page-display-mode"></select>
            </label>
          </div>
        </section>

        <div class="actions">
          <button id="save-settings" class="button button--primary" type="submit">保存设置</button>
          <button id="test-connection" class="button" type="button">测试连接</button>
          <button id="reset-settings" class="button" type="button">恢复默认</button>
        </div>
      </form>

      <footer id="status" class="status">准备就绪。</footer>
    </main>

    <script type="module" src="./options.js"></script>
  </body>
</html>
